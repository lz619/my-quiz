<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高敏感度指数测试 · 看见你与生俱来的细腻感知力</title>
    <style>
        :root {
            --bg: #f7f5f2;
            --card-bg: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #5c5c5c;
            --text-tertiary: #8a8a8a;
            --accent: #5b8c7a;
            --accent-light: #e8f0ec;
            --accent-medium: #8ab8a8;
            --progress-bg: #e8e5e0;
            --progress-fill: #5b8c7a;
            --progress-glow: #7dba9e;
            --option-hover: #f4f7f5;
            --option-selected-bg: #ecf3ef;
            --option-selected-border: #5b8c7a;
            --option-selected-dot: #5b8c7a;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.06), 0 1px 4px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --font-stack: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(91, 140, 122, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 70%, rgba(138, 184, 168, 0.03) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(180, 170, 155, 0.03) 0%, transparent 70%);
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        /* ========== 头部 ========== */
        .header {
            text-align: center;
            margin-bottom: 28px;
            padding: 0 8px;
        }

        .header-icon {
            display: inline-block;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #eaf4ef 0%, #dcebe3 100%);
            margin-bottom: 16px;
            position: relative;
            line-height: 52px;
            font-size: 26px;
            user-select: none;
        }

        .header h1 {
            font-size: 1.65rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .header .subtitle {
            font-size: 0.9rem;
            color: var(--text-tertiary);
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        /* ========== 进度条区域 ========== */
        .progress-area {
            margin-bottom: 20px;
            padding: 0 4px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            letter-spacing: 0.01em;
        }

        .progress-info .current {
            font-weight: 600;
            color: var(--accent);
            font-size: 0.9rem;
        }

        .progress-info .total {
            color: var(--text-tertiary);
        }

        .progress-bar-outer {
            width: 100%;
            height: 6px;
            background-color: var(--progress-bg);
            border-radius: 99px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, #5b8c7a 0%, #7dba9e 50%, #8cc8ab 100%);
            border-radius: 99px;
            transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .progress-bar-inner::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid var(--progress-fill);
            box-shadow: 0 0 0 4px rgba(91, 140, 122, 0.12);
            transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-dots {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            padding: 0 2px;
        }

        .progress-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #dcd8d2;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-dot.completed {
            background-color: var(--accent-medium);
            box-shadow: 0 0 6px rgba(91, 140, 122, 0.3);
        }

        .progress-dot.active {
            background-color: var(--accent);
            box-shadow: 0 0 8px rgba(91, 140, 122, 0.45);
            transform: scale(1.5);
        }

        /* ========== 题目卡片 ========== */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 32px 28px 28px;
            box-shadow: var(--shadow-md);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #5b8c7a 0%, #8ab8a8 100%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .card.fade-out {
            opacity: 0;
            transform: translateY(-8px);
            transition: all 0.25s ease-out;
        }

        .card.fade-in {
            opacity: 1;
            transform: translateY(0);
            transition: all 0.35s ease-out;
        }

        .question-number {
            display: inline-block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 12px;
            background: var(--accent-light);
            padding: 5px 14px;
            border-radius: 99px;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.7;
            margin-bottom: 24px;
            letter-spacing: 0.01em;
        }

        /* ========== 选项按钮 ========== */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .option-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            padding: 15px 18px;
            border: 1.5px solid #e8e5e0;
            border-radius: var(--radius-md);
            background: #fafaf8;
            cursor: pointer;
            font-family: var(--font-stack);
            font-size: 0.95rem;
            color: var(--text-primary);
            transition: all var(--transition-fast);
            text-align: left;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .option-btn:hover {
            background: var(--option-hover);
            border-color: #d5d0c8;
            box-shadow: var(--shadow-sm);
            transform: translateY(-1px);
        }

        .option-btn:active {
            transform: scale(0.985);
            transition: transform 0.1s ease;
        }

        .option-letter {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f0ede8;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-secondary);
            flex-shrink: 0;
            transition: all var(--transition-fast);
            letter-spacing: 0;
        }

        .option-btn.selected {
            background: var(--option-selected-bg);
            border-color: var(--option-selected-border);
            box-shadow: 0 0 0 3px rgba(91, 140, 122, 0.08);
            font-weight: 500;
        }

        .option-btn.selected .option-letter {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 8px rgba(91, 140, 122, 0.25);
        }

        .option-label {
            flex: 1;
            line-height: 1.5;
        }

        /* ========== 导航按钮 ========== */
        .nav-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding: 0 4px;
            gap: 12px;
        }

        .btn-nav {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 11px 20px;
            border-radius: 99px;
            font-family: var(--font-stack);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all var(--transition-fast);
            -webkit-tap-highlight-color: transparent;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        .btn-prev {
            background: transparent;
            color: var(--text-secondary);
            border: 1.5px solid #e0dcd6;
        }

        .btn-prev:hover {
            background: #f5f3f0;
            border-color: #cbc5bd;
            color: var(--text-primary);
        }

        .btn-prev:active {
            background: #eeeae5;
            transform: scale(0.96);
        }

        .btn-prev:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: none;
        }

        .btn-next {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 10px rgba(91, 140, 122, 0.25);
        }

        .btn-next:hover {
            background: #4d7a69;
            box-shadow: 0 4px 16px rgba(91, 140, 122, 0.35);
            transform: translateY(-1px);
        }

        .btn-next:active {
            background: #416b5b;
            transform: scale(0.96);
        }

        .btn-skip {
            background: transparent;
            color: var(--text-tertiary);
            font-size: 0.85rem;
            padding: 10px 16px;
            border: none;
            cursor: pointer;
            font-family: var(--font-stack);
            transition: color var(--transition-fast);
            -webkit-tap-highlight-color: transparent;
            letter-spacing: 0.02em;
        }

        .btn-skip:hover {
            color: var(--text-secondary);
        }

        /* ========== 结果页面 ========== */
        .result-area {
            display: none;
            animation: fadeSlideIn 0.5s ease-out;
        }

        .result-area.visible {
            display: block;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-card {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 36px 28px 30px;
            box-shadow: var(--shadow-lg);
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .result-score-circle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #eaf4ef 0%, #d5e8de 100%);
            margin-bottom: 20px;
            position: relative;
            box-shadow: 0 0 0 12px rgba(91, 140, 122, 0.06), 0 8px 30px rgba(91, 140, 122, 0.10);
        }

        .result-score-inner {
            text-align: center;
        }

        .result-score-number {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
            letter-spacing: -0.02em;
        }

        .result-score-total {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            margin-top: 2px;
            letter-spacing: 0.03em;
        }

        .result-level {
            display: inline-block;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--accent);
            background: var(--accent-light);
            padding: 8px 20px;
            border-radius: 99px;
            margin-bottom: 18px;
            letter-spacing: 0.02em;
        }

        .result-description {
            text-align: left;
            background: #fafaf8;
            border-radius: var(--radius-lg);
            padding: 22px 20px;
            margin-top: 16px;
            line-height: 1.8;
            font-size: 0.92rem;
            color: var(--text-secondary);
            border: 1px solid #efede8;
        }

        .result-description h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            margin-top: 16px;
            letter-spacing: 0.01em;
        }

        .result-description h4:first-child {
            margin-top: 0;
        }

        .result-description p {
            margin-bottom: 10px;
        }

        .result-description ul {
            padding-left: 20px;
            margin-bottom: 10px;
        }

        .result-description ul li {
            margin-bottom: 5px;
        }

        .btn-restart {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 22px;
            padding: 13px 28px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 99px;
            font-family: var(--font-stack);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.02em;
            box-shadow: 0 2px 12px rgba(91, 140, 122, 0.25);
            transition: all var(--transition-fast);
            -webkit-tap-highlight-color: transparent;
        }

        .btn-restart:hover {
            background: #4d7a69;
            box-shadow: 0 6px 20px rgba(91, 140, 122, 0.35);
            transform: translateY(-2px);
        }

        .btn-restart:active {
            transform: scale(0.95);
            background: #416b5b;
        }

        .disclaimer {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-top: 16px;
            letter-spacing: 0.02em;
            line-height: 1.5;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 500px) {
            body {
                padding: 12px;
                align-items: flex-start;
                padding-top: 24px;
            }

            .header h1 {
                font-size: 1.4rem;
            }

            .header-icon {
                width: 42px;
                height: 42px;
                line-height: 42px;
                font-size: 22px;
                margin-bottom: 10px;
            }

            .card {
                padding: 24px 18px 20px;
                border-radius: var(--radius-lg);
            }

            .question-text {
                font-size: 1.05rem;
                margin-bottom: 18px;
            }

            .option-btn {
                padding: 13px 14px;
                font-size: 0.9rem;
                gap: 10px;
                border-radius: var(--radius-sm);
            }

            .option-letter {
                width: 30px;
                height: 30px;
                font-size: 0.8rem;
            }

            .btn-nav {
                padding: 10px 16px;
                font-size: 0.85rem;
            }

            .result-card {
                padding: 28px 16px 22px;
            }

            .result-score-circle {
                width: 100px;
                height: 100px;
                box-shadow: 0 0 0 8px rgba(91, 140, 122, 0.06), 0 6px 20px rgba(91, 140, 122, 0.08);
            }

            .result-score-number {
                font-size: 2.3rem;
            }

            .result-description {
                padding: 16px 14px;
                font-size: 0.85rem;
            }

            .progress-dot {
                width: 4px;
                height: 4px;
            }
            .progress-dots {
                padding: 0 1px;
            }
        }

        @media (max-width: 360px) {
            .card {
                padding: 20px 14px 16px;
            }
            .question-text {
                font-size: 0.95rem;
            }
            .option-btn {
                padding: 11px 12px;
                font-size: 0.85rem;
                gap: 8px;
            }
            .option-letter {
                width: 28px;
                height: 28px;
                font-size: 0.75rem;
            }
            .btn-nav {
                padding: 9px 13px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="header-icon">🌿</div>
            <h1>高敏感度指数测试</h1>
            <p class="subtitle">看见你与生俱来的细腻感知力</p>
        </div>

        <!-- 进度条区域 -->
        <div class="progress-area" id="progressArea">
            <div class="progress-info">
                <span class="current" id="progressCurrent">第 1 题</span>
                <span class="total" id="progressTotal">共 20 题</span>
            </div>
            <div class="progress-bar-outer">
                <div class="progress-bar-inner" id="progressBar" style="width: 0%;"></div>
            </div>
            <div class="progress-dots" id="progressDots"></div>
        </div>

        <!-- 题目卡片 -->
        <div class="card fade-in" id="questionCard">
            <span class="question-number" id="questionNumber">Q1</span>
            <p class="question-text" id="questionText"></p>
            <div class="options-list" id="optionsList"></div>
        </div>

        <!-- 导航按钮 -->
        <div class="nav-area" id="navArea">
            <button class="btn-nav btn-prev" id="btnPrev" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                上一题
            </button>
            <span style="font-size:0.82rem;color:var(--text-tertiary);" id="navHint">点击选项自动跳转</span>
            <button class="btn-nav btn-next" id="btnNext" disabled>
                下一题
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
        </div>

        <!-- 结果区域（初始隐藏） -->
        <div class="result-area" id="resultArea">
            <div class="result-card" id="resultCard"></div>
            <p class="disclaimer">⚠ 本测试仅供参考与自我探索，不构成专业心理诊断。<br>如有需要，请咨询专业心理咨询师。</p>
        </div>
    </div>

    <script>
        (function() {
            // ==================== 题目数据 ====================
            const questions = [{
                id: 1,
                text: '结束一场热闹的聚会后，即使当时很开心，你也会在回家的路上感到一种深深的疲惫，好像能量被悄悄抽走了。',
                options: [
                    'A. 完全不符合——聚会后我反而更精神',
                    'B. 不太符合——偶尔会累，但很快恢复',
                    'C. 比较符合——经常感到明显的消耗',
                    'D. 非常符合——每次结束都想立刻躲回自己的空间',
                ],
            }, {
                id: 2,
                text: '你常常能察觉房间里气氛的微妙变化——比如有人不开心却还在微笑，而其他人可能毫无感觉。',
                options: [
                    'A. 完全不符合——我很少注意这些',
                    'B. 不太符合——有时能感觉到，但不确定',
                    'C. 比较符合——经常能捕捉到这种隐藏的情绪',
                    'D. 非常符合——这几乎是一种本能，躲都躲不掉',
                ],
            }, {
                id: 3,
                text: '比起一口气认识很多人，你更喜欢慢慢和一个能真正说话的人待在一起，哪怕只是安静地坐着。',
                options: [
                    'A. 完全不符合——我享受认识新朋友的快感',
                    'B. 不太符合——看情况，有时也想热闹',
                    'C. 比较符合——深度连接让我更安心',
                    'D. 非常符合——一个懂我的人胜过千百个泛泛之交',
                ],
            }, {
                id: 4,
                text: '突然的敲门声、尖锐的电话铃或者背后传来的汽车鸣笛，会让你心跳加速，甚至一整天都隐隐不安。',
                options: [
                    'A. 完全不符合——这些声音对我没什么影响',
                    'B. 不太符合——偶尔被吓一跳，但很快平复',
                    'C. 比较符合——经常被突然的声响惊到',
                    'D. 非常符合——我对这类刺激异常敏感，需要很久才能缓过来',
                ],
            }, {
                id: 5,
                text: '在做重要决定之前，你的大脑里会反复上演“如果…会怎样”的场景，哪怕只是选一件衣服、点一个菜。',
                options: [
                    'A. 完全不符合——我通常凭直觉快速决定',
                    'B. 不太符合——大事会想，小事很随意',
                    'C. 比较符合——多数时候都会在心里翻来覆去地琢磨',
                    'D. 非常符合——连最小的事我也能纠结很久，生怕选错',
                ],
            }, {
                id: 6,
                text: '你需要的“充电”方式往往不是狂欢，而是一个人静静地看书、散步、听音乐，或者干脆什么都不做。',
                options: [
                    'A. 完全不符合——我需要通过热闹来恢复能量',
                    'B. 不太符合——有时独处，有时热闹，看心情',
                    'C. 比较符合——独处是我恢复精力的主要方式',
                    'D. 非常符合——只有充分的独处，我才能感觉自己又“活”过来',
                ],
